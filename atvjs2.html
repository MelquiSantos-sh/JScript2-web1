<!DOCTYPE html>
<html lang="pt-br"> <!-- Caixa que guarda a página inteira, em português do Brasil -->
<head> <!-- Bastidores da página -->
  <meta charset="UTF-8"> <!-- Garante que os acentos apareçam certinho -->
  <title>Exercício 2</title> <!-- Texto da aba do navegador -->
  <style>
    /* ===== Estilos (CSS) ===== */
 
    body {
      font-family: Arial, sans-serif;     /* Tipo de letra da página */
      padding: 30px;                      /* Espaço entre o conteúdo e a borda da janela */
      transition: background-color 0.3s;  /* Troca de cor de fundo suave, em 0.3s */
    }
 
    p {
      max-width: 500px;  /* Texto não fica mais largo que 500px */
      line-height: 1.6;  /* Espaço extra entre linhas */
    }
 
    .botoes {
      margin-top: 20px;
      display: flex;     /* Botões em fileira, lado a lado */
      gap: 10px;          /* Espaço entre os botões */
      flex-wrap: wrap;    /* Se não couber tudo na linha, quebra para a próxima */
    }
 
    button {
      padding: 8px 16px;
      cursor: pointer;            /* Mãozinha ao passar o mouse */
      border: 1px solid #999;
      background-color: #f0f0f0;
      font-size: 14px;
      border-radius: 4px;
    }
 
    button:hover {
      background-color: #ddd;     /* Fica mais escuro quando o mouse passa por cima */
    }
 
    .campo-cor {                  /* Caixa que agrupa a caixinha de digitar + o botão "aplicar" */
      margin-top: 16px;
      display: flex;
      gap: 8px;
      align-items: center;        /* Alinha tudo no centro verticalmente */
    }
 
    .campo-cor input {             /* Só vale para o <input> que estiver dentro de .campo-cor */
      padding: 7px 10px;
      font-size: 14px;
      border: 1px solid #999;
      border-radius: 4px;
      width: 160px;                /* Largura fixa da caixinha de texto */
    }
 
    #msg-erro {                    /* "#" = id, um nome único nesta página */
      color: red;                  /* Texto de erro aparece em vermelho */
      font-size: 13px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
 
  <p>
    Lorem ipsum dolor sit amet consectetur, adipisicing elit. 
    Fuga corporis qui illum porro atque quae omnis earum, 
    molestiae aliquid voluptatum esse asperiores, quia ipsum.
  </p>
 
  <div class="botoes"> <!-- Três botões de cor fixa, iguais ao Exercício 1 -->
    <button onclick="mudarCor('blue')">azul</button>
    <button onclick="mudarCor('lightgreen')">verde claro</button>
    <button onclick="mudarCor('red')">vermelho</button>
  </div>
 
  <div class="campo-cor"> <!-- Campo novo: digitar o nome de qualquer cor -->
    <input type="text" id="inputCor" placeholder="nome da cor" />
    <!-- Caixinha de texto livre. placeholder = dica cinza que desaparece ao digitar -->
 
    <button onclick="aplicarCorPersonalizada()">aplicar</button>
    <!-- Ao clicar, chama a função aplicarCorPersonalizada() -->
  </div>
 
  <div id="msg-erro"></div>
  <!-- Caixinha vazia, reservada para mostrar mensagens de erro depois -->
 
  <script>
    // ===== JavaScript =====
 
    function mudarCor(cor) {
      document.body.style.backgroundColor = cor;        // Pinta o fundo da página com a cor recebida
      document.getElementById('msg-erro').textContent = ''; // Limpa qualquer mensagem de erro antiga
    }
 
    function aplicarCorPersonalizada() {
      // Busca a caixinha de texto (#inputCor), pega o que foi digitado (.value)
      // e remove espaços em branco extras no início/fim (.trim())
      const cor = document.getElementById('inputCor').value.trim();
 
      // Guarda a caixinha de mensagens de erro, para usar nos próximos passos
      const msgErro = document.getElementById('msg-erro');
 
      if (!cor) {
        // "!cor" = "se NÃO tem nada digitado". Se a caixinha estava vazia:
        msgErro.textContent = 'Digite o nome de uma cor.';
        return; // Para a função aqui, sem continuar
      }
 
      // Testa se a cor é válida aplicando em elemento temporário
      const teste = document.createElement('div'); // Cria uma <div> invisível, só para teste
      teste.style.backgroundColor = cor;             // Tenta aplicar a cor digitada nessa div de teste
 
      if (teste.style.backgroundColor === '') {
        // Se o navegador não reconheceu a cor, o valor continua vazio
        msgErro.textContent = 'Cor inválida. Tente: yellow, pink, orange...';
      } else {
        // Cor reconhecida: aplica de verdade na página e limpa o erro
        document.body.style.backgroundColor = cor;
        msgErro.textContent = '';
      }
    }
  </script>
 
</body>
</html>
