<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Exercício 2</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      transition: background-color 0.3s;
    }
 
    p {
      max-width: 500px;
      line-height: 1.6;
    }
 
    .botoes {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
 
    button {
      padding: 8px 16px;
      cursor: pointer;
      border: 1px solid #999;
      background-color: #f0f0f0;
      font-size: 14px;
      border-radius: 4px;
    }
 
    button:hover {
      background-color: #ddd;
    }
 
    .campo-cor {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
 
    .campo-cor input {
      padding: 7px 10px;
      font-size: 14px;
      border: 1px solid #999;
      border-radius: 4px;
      width: 160px;
    }
 
    #msg-erro {
      color: red;
      font-size: 13px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
 
  <p>
    Lorem ipsum dolor sit amet consectetur, adipisicing elit. 
    Fuga corporis qui illum porro atque quae omnis earum, 
    molestiae aliquid voluptatum esse asperiores, quia ipsum.
  </p>
 
  <div class="botoes">
    <button onclick="mudarCor('blue')">azul</button>
    <button onclick="mudarCor('lightgreen')">verde claro</button>
    <button onclick="mudarCor('red')">vermelho</button>
  </div>
 
  <div class="campo-cor">
    <input type="text" id="inputCor" placeholder="nome da cor" />
    <button onclick="aplicarCorPersonalizada()">aplicar</button>
  </div>
  <div id="msg-erro"></div>
 
  <script>
    function mudarCor(cor) {
      document.body.style.backgroundColor = cor;
      document.getElementById('msg-erro').textContent = '';
    }
 
    function aplicarCorPersonalizada() {
      const cor = document.getElementById('inputCor').value.trim();
      const msgErro = document.getElementById('msg-erro');
 
      if (!cor) {
        msgErro.textContent = 'Digite o nome de uma cor.';
        return;
      }
 
      // Testa se a cor é válida aplicando em elemento temporário
      const teste = document.createElement('div');
      teste.style.backgroundColor = cor;
 
      if (teste.style.backgroundColor === '') {
        msgErro.textContent = 'Cor inválida. Tente: yellow, pink, orange...';
      } else {
        document.body.style.backgroundColor = cor;
        msgErro.textContent = '';
      }
    }
  </script>
 
</body>
</html>
